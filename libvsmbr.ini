[project]
name: "libvsmbr"
status: "experimental"
year_of_creation: "2010"
data_format: "Master Boot Record (MBR) volume system"
documentation_url: "https://github.com/libyal/libvsmbr/tree/main/documentation"
features: ["debug_output", "ossfuzz", "python_bindings", "tools"]

[library]
features: ["pthread", "wide_character_type"]
public_types: ["partition", "volume"]
tests: ["boot_record", "chs_address", "error", "io_handle", "notify", "partition_entry", "partition_type", "partition_values", "section_values", "sector_data"]
tests_with_input: ["partition", "support", "volume"]

[python_module]
tests: ["support"]
tests_with_input: ["partition", "volume"]

[tools]
description: "Several tools for Several tools for reading Master Boot Record (MBR) volume systems"
names: ["vsmbrinfo"]
tests: ["info_handle", "output", "signal"]

[test_data]
repository: "log2timeline/dfvfs"
files: ["mbr.raw"]

[tests]
profiles: ["libvsmbr", "pyvsmbr", "vsmbrinfo"]
options_per_profile: ["", "", ""]
info_tool_profiles: ["vsmbrinfo"]
example_filename1: "image1.raw"
example_filename2: "image2.raw"

[troubleshooting]
example: "vsmbrinfo image.raw"

